name: Tauri Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.1)'
        required: true
        type: string
        default: 'v0.1.1'
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  check-desktop:
    name: Check Desktop Package
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check desktop package files
        id: check
        run: |
          READY=true
          if [ ! -s "packages/desktop/Cargo.toml" ]; then
            echo "⚠️ Cargo.toml is empty or missing"
            READY=false
          fi
          if [ ! -s "packages/desktop/tauri.conf.json" ]; then
            echo "⚠️ tauri.conf.json is empty or missing"
            READY=false
          fi
          if [ ! -s "packages/desktop/src/main.rs" ]; then
            echo "⚠️ src/main.rs is empty or missing"
            READY=false
          fi
          echo "ready=$READY" >> $GITHUB_OUTPUT
          if [ "$READY" = "false" ]; then
            echo "::warning::Desktop package is not ready, skipping Tauri build"
          fi

  build:
    needs: check-desktop
    if: needs.check-desktop.outputs.ready == 'true'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: deb
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Configure Cargo to use USTC mirror
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = 'ustc'

          [source.ustc]
          registry = "sparse+https://mirrors.ustc.edu.cn/crates.io-index/"

          [net]
          git-fetch-with-cli = true
          EOF

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm run test
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Run type check
        run: pnpm run lint

      - name: Install system dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Tauri app
        working-directory: packages/desktop
        run: |
          cargo install tauri-cli --version "^2"
          cargo tauri build --target ${{ matrix.platform.target }} --bundles ${{ matrix.platform.bundle }}
        env:
          TAURI_BUNDLE: ${{ matrix.platform.bundle }}
          TAURI_TARGET: ${{ matrix.platform.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ matrix.platform.target }}-${{ matrix.platform.bundle }}
          path: |
            packages/desktop/target/${{ matrix.platform.target }}/release/bundle/${{ matrix.platform.bundle }}/*
          retention-days: 90

  release:
    needs: [check-desktop, build]
    if: always() && needs.check-desktop.outputs.ready == 'true' && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          echo "## SCP Foundation Terminal $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "### 🖥️ Desktop Application" >> release_notes.md
          echo "" >> release_notes.md
          echo "This release includes the desktop application for Linux, macOS, and Windows." >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "Choose the appropriate installer for your platform:" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Linux**: Download the \`.deb\` file" >> release_notes.md
          echo "- **macOS**: Download the \`.dmg\` file (Intel or Apple Silicon)" >> release_notes.md
          echo "- **Windows**: Download the \`.msi\` or \`.exe\` file" >> release_notes.md
          echo "" >> release_notes.md

          if [ -n "$PREV_TAG" ]; then
            echo "### 📝 Changelog" >> release_notes.md
            echo "" >> release_notes.md
            git log --pretty=format:"- %s" "$PREV_TAG"..HEAD >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag if not exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
          else
            echo "Tag $VERSION already exists"
          fi
