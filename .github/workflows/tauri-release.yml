name: Tauri Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.1.1)'
        required: true
        type: string
        default: 'v0.1.1'
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: deb
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: appimage
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: nsis

    runs-on: ${{ matrix.platform.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.target }}

      - name: Configure Rust to use USTC mirror
        run: |
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << 'EOF'
          [source.crates-io]
          replace-with = 'ustc'

          [source.ustc]
          registry = "sparse+https://mirrors.ustc.edu.cn/crates.io-index/"

          [net]
          git-fetch-with-cli = true
          EOF
          cat ~/.cargo/config.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run type check
        run: npm run lint

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install system dependencies (Linux)
        if: matrix.platform.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_BUNDLE: ${{ matrix.platform.bundle }}
          TAURI_TARGET: ${{ matrix.platform.target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-bundle-${{ matrix.platform.target }}-${{ matrix.platform.bundle }}
          path: |
            src-tauri/target/${{ matrix.platform.target }}/release/bundle/${{ matrix.platform.bundle }}/*
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## SCP Foundation Terminal $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "### 🚀 Features" >> release_notes.md
          echo "" >> release_notes.md
          echo "This release includes the desktop application of SCP Foundation Terminal." >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📦 Installation" >> release_notes.md
          echo "" >> release_notes.md
          echo "Choose the appropriate installer for your platform:" >> release_notes.md
          echo "" >> release_notes.md
          echo "- **Linux**: Download the `.deb` or `.AppImage` file" >> release_notes.md
          echo "- **macOS**: Download the `.dmg` file (Intel or Apple Silicon)" >> release_notes.md
          echo "- **Windows**: Download the `.msi` or `.exe` file" >> release_notes.md
          echo "" >> release_notes.md
          echo "### 📝 Changelog" >> release_notes.md
          echo "" >> release_notes.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0^) >> release_notes.md || echo "No previous release found" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag if not exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
          else
            echo "Tag $VERSION already exists"
          fi