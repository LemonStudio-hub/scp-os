[package]
name = "scp-os-desktop"
version = "0.1.5"
description = "SCP Foundation Terminal Desktop Application"
authors = ["SCP-OS Team"]
license = "MIT"
repository = "https://github.com/LemonStudio-hub/scp-os"
edition = "2021"
rust-version = "1.77.2"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
custom-protocol = ["tauri/custom-protocol"]
