name = "scp-os-worker"
main = "index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
API_DOMAIN = "os1api.daum.pw"
EMAIL_FROM = "SCP OS <auth@daum.pw>"

[[durable_objects.bindings]]
name = "CHAT_ROOM_DO"
class_name = "ChatRoomDO"

[[d1_databases]]
binding = "SCP_DB"
database_name = "scp-database"
database_id = "99721726-14e5-49a7-8260-7c09f03f0d72"
migrations_dir = "migrations"

[[d1_databases]]
binding = "SCP_READER_DB"
database_name = "scp-reader-db"
database_id = "03f2e67c-a50d-4db5-ae72-1612dd9090d9"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "SCP_CACHE"
id = "c3296c65b63f4b99af6fd2e957d2932e"

[[r2_buckets]]
binding = "SCP_FILES"
bucket_name = "scp-os-files"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoomDO"]

[triggers]
crons = ["*/10 * * * *"]

# ─── 生产环境（正式部署）────────────────────────────────
# wrangler deploy --env production
[env.production]
vars = { ENVIRONMENT = "production", API_DOMAIN = "os1api.daum.pw", EMAIL_FROM = "SCP OS <auth@daum.pw>" }

[[env.production.durable_objects.bindings]]
name = "CHAT_ROOM_DO"
class_name = "ChatRoomDO"

[[env.production.d1_databases]]
binding = "SCP_DB"
database_name = "scp-database"
database_id = "99721726-14e5-49a7-8260-7c09f03f0d72"
migrations_dir = "migrations"

[[env.production.d1_databases]]
binding = "SCP_READER_DB"
database_name = "scp-reader-db"
database_id = "03f2e67c-a50d-4db5-ae72-1612dd9090d9"
migrations_dir = "migrations"

[[env.production.kv_namespaces]]
binding = "SCP_CACHE"
id = "4e9c713528b1479ea7abd2082f184ed1"

[[env.production.r2_buckets]]
binding = "SCP_FILES"
bucket_name = "scp-os-files"

# ─── 开发环境（本地测试）────────────────────────────────
# wrangler dev --env development
[env.development]
vars = { ENVIRONMENT = "development", API_DOMAIN = "api.scpos.site", EMAIL_FROM = "SCP OS <auth@daum.pw>" }

[[env.development.durable_objects.bindings]]
name = "CHAT_ROOM_DO"
class_name = "ChatRoomDO"

[[env.development.d1_databases]]
binding = "SCP_DB"
database_name = "scp-database-dev"
database_id = "local-dev-scp-db"
migrations_dir = "migrations"

[[env.development.d1_databases]]
binding = "SCP_READER_DB"
database_name = "scp-reader-db-dev"
database_id = "local-dev-scp-reader-db"
migrations_dir = "migrations"

[[env.development.kv_namespaces]]
binding = "SCP_CACHE"
id = "local-dev-cache"

[[env.development.r2_buckets]]
binding = "SCP_FILES"
bucket_name = "scp-os-files-dev"
